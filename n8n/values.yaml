# n8n-custom.yaml

# 1. Image Pinning (Recommended for stability)
image:
  tag: "2.8.1" # Replace with the latest version you want

# 2. Security (PASTE YOUR GENERATED KEY BELOW)
encryptionKey: "PASTE_YOUR_GENERATED_KEY_HERE"

# 3. Database Configuration (Use Postgres instead of SQLite)
db:
  type: postgresdb

# 4. Enable the internal Postgres database
postgresql:
  enabled: true
  auth:
    username: n8n
    password: "secure_db_password" # Must match the password above
    database: n8n
  primary:
    persistence:
      enabled: true
      size: 10Gi

# 5. Persistence (Save your workflows and files)
main:
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce

# 6. Ingress (Expose to the internet)
ingress:
  enabled: true
  className: nginx # Change if using Traefik or ALB
  hosts:
    - host: n8n-dev-ins.xyz.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: star-xyz-cert
      hosts:
        - n8n-dev-ins.xyz.com

# 7. Resources (Prevent crashes)
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi